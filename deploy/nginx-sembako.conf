# Salin ke: /etc/nginx/sites-available/sembako
# sudo ln -sf /etc/nginx/sites-available/sembako /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Ganti server_name jika sudah punya domain.

upstream sembako_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name 103.183.75.19 _;

    client_max_body_size 6M;

    location /static {
        alias /home/sembapos/sembako-kuningan/app/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://sembako_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
