<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <title>Login — Kasir Sembako</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">🏪</div>
      <h1>Kasir Sembako</h1>
      <p>Sistem Point of Sale Multi-Tenant</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
            <span>{{ '✅' if category == 'success' else '❌' }}</span>
            <span>{{ message }}</span>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Masukkan password" autocomplete="current-password" required>
          <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;" id="passToggle">👁️</button>
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;accent-color:var(--primary);">
        <label for="remember" style="color:var(--text-muted);font-size:13px;cursor:pointer;">Ingat saya</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        <span id="btnText">🔐 Masuk</span>
        <span id="btnSpinner" style="display:none;" class="spinner"></span>
      </button>
    </form>

    <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border);">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Akun Demo</p>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button onclick="fillLogin('superadmin','admin123')" class="demo-btn" style="background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.2);border-radius:8px;padding:8px 12px;color:var(--primary-light);font-size:12px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:all 0.2s;">
          🔑 Super Admin &mdash; <span style="color:var(--text-muted);">superadmin / admin123</span>
        </button>
        <button onclick="fillLogin('admin_toko_makmur','admin123')" class="demo-btn" style="background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.15);border-radius:8px;padding:8px 12px;color:var(--secondary);font-size:12px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:all 0.2s;">
          🛡️ Admin Toko &mdash; <span style="color:var(--text-muted);">admin_toko_makmur / admin123</span>
        </button>
        <button onclick="fillLogin('kasir_makmur','kasir123')" class="demo-btn" style="background:rgba(255,165,2,0.08);border:1px solid rgba(255,165,2,0.15);border-radius:8px;padding:8px 12px;color:var(--warning);font-size:12px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:all 0.2s;">
          💼 Kasir &mdash; <span style="color:var(--text-muted);">kasir_makmur / kasir123</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function fillLogin(user, pass) {
  document.querySelector('[name=username]').value = user;
  document.getElementById('passwordInput').value = pass;
}

function togglePass() {
  const inp = document.getElementById('passwordInput');
  const btn = document.getElementById('passToggle');
  if(inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

document.getElementById('loginForm').addEventListener('submit', function() {
  document.getElementById('btnText').style.display = 'none';
  document.getElementById('btnSpinner').style.display = 'inline-flex';
  document.getElementById('submitBtn').disabled = true;
});
</script>
</body>
</html>
