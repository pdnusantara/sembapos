<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <title>Login — Kasir Sembako</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=static_css_v) }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">🏪</div>
      <h1>Kasir Sembako</h1>
      <p>Sistem Point of Sale Multi-Tenant</p>
      <p style="margin-top:10px;font-size:13px;"><a href="{{ url_for('landing.index') }}" style="color:var(--primary-light);">← Beranda</a></p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
            <span>{{ '✅' if category == 'success' else '❌' }}</span>
            <span>{{ message }}</span>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-input-wrap">
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Masukkan password" autocomplete="current-password" required>
          <button type="button" onclick="togglePass()" class="password-toggle" id="passToggle" aria-label="Tampilkan atau sembunyikan password">👁️</button>
        </div>
      </div>
      <div class="form-group remember-wrap">
        <input type="checkbox" name="remember" id="remember" class="remember-check">
        <label for="remember" class="remember-label">Ingat saya</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        <span id="btnText">🔐 Masuk</span>
        <span id="btnSpinner" class="spinner btn-spinner-hidden"></span>
      </button>
    </form>

    <div class="demo-accounts">
      <p class="demo-title">Akun Demo</p>
      <div class="demo-list">
        <button onclick="fillLogin('superadmin','admin123')" class="demo-btn demo-btn-superadmin">
          🔑 Super Admin &mdash; <span class="demo-cred">superadmin / admin123</span>
        </button>
        <button onclick="fillLogin('admin_toko_makmur','admin123')" class="demo-btn demo-btn-admin">
          🛡️ Admin Toko &mdash; <span class="demo-cred">admin_toko_makmur / admin123</span>
        </button>
        <button onclick="fillLogin('kasir_makmur','kasir123')" class="demo-btn demo-btn-cashier">
          💼 Kasir &mdash; <span class="demo-cred">kasir_makmur / kasir123</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function fillLogin(user, pass) {
  document.querySelector('[name=username]').value = user;
  document.getElementById('passwordInput').value = pass;
}

function togglePass() {
  const inp = document.getElementById('passwordInput');
  const btn = document.getElementById('passToggle');
  if(inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

document.getElementById('loginForm').addEventListener('submit', function() {
  document.getElementById('btnText').style.display = 'none';
  document.getElementById('btnSpinner').classList.remove('btn-spinner-hidden');
  document.getElementById('submitBtn').disabled = true;
});
</script>
</body>
</html>
