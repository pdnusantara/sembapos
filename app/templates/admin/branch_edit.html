{% extends 'base.html' %}
{% block title %}Edit Cabang{% endblock %}
{% block page_title %}✏️ Edit Cabang{% endblock %}
{% block page_sub %}{{ branch.nama }} · {{ branch.kode }}{% endblock %}

{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label class="form-label">Nama cabang *</label>
        <input type="text" name="nama" class="form-control" required minlength="2" value="{{ branch.nama }}">
      </div>
      <div class="form-group">
        <label class="form-label">Kode cabang *</label>
        <input type="text" name="kode" class="form-control" required minlength="2" maxlength="20" value="{{ branch.kode }}" style="text-transform:uppercase;">
        <p class="text-muted" style="font-size:12px;margin-top:6px;">Harus unik dalam tenant Anda.</p>
      </div>
      <div class="form-group">
        <label class="form-label">Alamat</label>
        <input type="text" name="alamat" class="form-control" value="{{ branch.alamat or '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Telepon</label>
        <input type="text" name="telepon" class="form-control" value="{{ branch.telepon or '' }}">
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;">
        <button type="submit" class="btn btn-primary">💾 Simpan</button>
        <a href="{{ url_for('admin.branches') }}" class="btn btn-outline">← Kembali</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
