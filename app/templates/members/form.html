{% extends 'base.html' %}
{% block title %}{{ 'Edit' if member else 'Tambah' }} Pelanggan{% endblock %}
{% block page_title %}👤 {{ 'Edit Data Pelanggan' if member else 'Daftar Pelanggan Baru' }}{% endblock %}

{% block content %}
<div style="max-width:600px;">
  <div class="card">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="grid-2">
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Nama Lengkap *</label>
          <input type="text" name="nama" class="form-control" required value="{{ member.nama if member else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Nomor WhatsApp/HP *</label>
          <input type="text" name="telepon" class="form-control" required value="{{ member.telepon if member else '' }}" placeholder="08xxx (Dipakai sbg ID)">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ member.email if member else '' }}">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Alamat Lengkap</label>
          <input type="text" name="alamat" class="form-control" value="{{ member.alamat if member else '' }}">
        </div>
        
        {% if member %}
        <div class="form-group" style="grid-column:1/-1;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" name="aktif" value="1" {% if member.aktif %}checked{% endif %}>
            <span>Member Aktif</span>
          </label>
        </div>
        {% endif %}
      </div>
      
      <div style="display:flex;gap:12px;margin-top:16px;">
        <button type="submit" class="btn btn-primary">💾 Simpan</button>
        <a href="{{ url_for('members.index') }}" class="btn btn-outline">✕ Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
