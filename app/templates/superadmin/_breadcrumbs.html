{% macro sa_bc(items) %}
<nav aria-label="Breadcrumb" style="font-size:13px;margin-bottom:14px;color:var(--text-muted);display:flex;flex-wrap:wrap;align-items:center;gap:6px;">
  {% for label, href, is_last in items %}
    {% if is_last %}
      <span style="color:var(--text-light);font-weight:600;">{{ label }}</span>
    {% else %}
      <a href="{{ href }}" style="color:var(--primary);text-decoration:none;">{{ label }}</a>
      <span aria-hidden="true">/</span>
    {% endif %}
  {% endfor %}
</nav>
{% endmacro %}
